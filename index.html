<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Byanda!</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Klee+One:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --pink:#f472b6; --pink-d:#db2777; --purple:#a78bfa; --text:#5a2d6e; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:"Klee One",cursive;
      background:linear-gradient(150deg,#fde8f0 0%,#e8d9f8 55%,#fcd5b5 100%);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      overflow:hidden; user-select:none;
    }
    body::before, body::after {
      content:""; position:fixed; border-radius:50%; pointer-events:none; opacity:0.13;
    }
    body::before {
      width:600px; height:600px;
      background:radial-gradient(circle,#f9a8d4,transparent);
      top:-150px; left:-150px;
      animation:blobF 9s ease-in-out infinite alternate;
    }
    body::after {
      width:450px; height:450px;
      background:radial-gradient(circle,#c4b5fd,transparent);
      bottom:-100px; right:-100px;
      animation:blobF 11s ease-in-out infinite alternate-reverse;
    }
    @keyframes blobF { from{transform:translate(0,0)} to{transform:translate(25px,18px)} }

    #scene { display:flex; flex-direction:column; align-items:center; gap:14px; }
    #top-label {
      font-family:"Press Start 2P",monospace;
      font-size:0.48rem; color:var(--pink-d); letter-spacing:2px; opacity:0.8;
    }
    #bunny-wrapper {
      cursor:pointer; display:inline-block;
      animation:bunFloat 3.2s ease-in-out infinite;
      filter:drop-shadow(0 10px 22px rgba(244,114,182,0.35));
    }
    #bunny-wrapper:hover { filter:brightness(1.05) drop-shadow(0 10px 22px rgba(244,114,182,0.5)); }
    @keyframes bunFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    #bunny-wrapper.wiggle { animation:bunWiggle 0.45s ease forwards; }
    @keyframes bunWiggle {
      0%{transform:rotate(0) scale(1)} 20%{transform:rotate(-7deg) scale(1.06)}
      55%{transform:rotate(7deg) scale(1.06)} 80%{transform:rotate(-3deg) scale(1)}
      100%{transform:rotate(0) scale(1)}
    }
    #bunny-img { width:220px; height:220px; object-fit:contain; image-rendering:pixelated; display:block; }
    #hint {
      font-family:"Press Start 2P",monospace;
      font-size:0.42rem; color:var(--text); opacity:0.65;
      letter-spacing:1px; text-align:center; line-height:1.9; transition:opacity 0.4s;
    }
    #hint.hidden { opacity:0; pointer-events:none; }

    #balloon-wrap { position:fixed; display:none; z-index:10; pointer-events:none; }
    #balloon-img {
      width:110px; height:110px; object-fit:contain; image-rendering:pixelated;
      cursor:pointer; pointer-events:all; transform-origin:bottom center;
      animation:bSway 1.8s ease-in-out infinite, bPulse 1.1s ease-in-out infinite;
      display:block;
    }
    @keyframes bSway { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(6deg)} }
    @keyframes bPulse {
      0%,100%{filter:drop-shadow(0 0 6px rgba(255,100,150,0.5))}
      50%{filter:drop-shadow(0 0 18px rgba(255,100,150,1))}
    }
    #balloon-wrap.flying { animation:flyAway 1.5s ease-in forwards; }
    @keyframes flyAway {
      0%{opacity:1;transform:translate(0,0) scale(1)}
      100%{opacity:0;transform:translate(var(--fx,60px),-300px) scale(0.3)}
    }

    #bday-msg {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0); z-index:300;
      background:rgba(255,245,250,0.95); backdrop-filter:blur(18px);
      border:3px solid var(--pink); outline:6px solid rgba(244,114,182,0.15);
      border-radius:4px; padding:18px 28px 16px; text-align:center;
      box-shadow:8px 8px 0 rgba(167,139,250,0.3);
      transition:transform 0.55s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none; min-width:300px; max-width:420px;
    }
    #bday-msg.visible { transform:translate(-50%,-50%) scale(1); pointer-events:all; }
    #bday-msg h1 {
      font-family:"Press Start 2P",monospace;
      font-size:0.65rem; color:var(--pink-d); line-height:2; margin-bottom:4px;
    }
    #bday-msg .kao { font-size:1.1rem; margin:5px 0; color:var(--purple); letter-spacing:4px; }
    #bday-msg p { font-family:"Klee One",cursive; color:var(--text); font-size:0.88rem; margin-top:4px; }
    #cake-canvas { display:block; margin:0 auto 6px; image-rendering:pixelated; }

    #blow-hint {
      font-family:"Press Start 2P",monospace; font-size:0.38rem; color:var(--pink-d);
      margin-top:10px; letter-spacing:1px; line-height:2;
    }
    #blow-hint.blink { animation:blinkHint 1s ease-in-out infinite; }
    @keyframes blinkHint { 0%,100%{opacity:1} 50%{opacity:0.25} }
    #mic-bar-wrap {
      width:100%; background:rgba(244,114,182,0.15);
      border:2px solid var(--pink); border-radius:3px; height:10px; margin-top:8px; overflow:hidden;
    }
    #mic-bar { height:100%; width:0%; background:linear-gradient(90deg,#f9a8d4,#f472b6); transition:width 0.07s; }
    #candle-status {
      font-family:"Press Start 2P",monospace; font-size:0.34rem;
      color:var(--purple); margin-top:6px; letter-spacing:1px; min-height:1.5em;
    }
    #bday-reveal { display:none; }
    #restart-btn {
      display:none; margin-top:12px; padding:9px 22px;
      background:var(--pink); color:white; border:none; border-radius:3px;
      box-shadow:3px 3px 0 var(--pink-d);
      font-family:"Press Start 2P",monospace; font-size:0.4rem; letter-spacing:1px;
      cursor:pointer; transition:transform 0.1s, box-shadow 0.1s;
    }
    #restart-btn:hover { transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--pink-d); }

    #confetti-canvas {
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:200; display:none;
    }

    #montage {
      position:fixed; inset:0; z-index:400;
      background:linear-gradient(135deg,#fde8f0,#e8d9f8,#fcd5b5);
      display:none; flex-direction:column; align-items:center; justify-content:center;
      overflow:hidden; padding:16px;
    }
    #montage.show { display:flex; }
    #montage::before {
      content:""; position:absolute; inset:0;
      background-image:repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,0.3) 28px,rgba(255,255,255,0.3) 30px);
      pointer-events:none;
    }
    #montage-title {
      font-family:"Press Start 2P",monospace; font-size:0.55rem; color:var(--pink-d);
      margin-bottom:14px; letter-spacing:2px;
      text-shadow:2px 2px 0 rgba(255,255,255,0.9); position:relative; z-index:1;
    }
    #photo-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:10px; max-width:700px; width:100%; position:relative; z-index:1;
    }
    .photo-frame {
      background:white; padding:5px 5px 20px 5px;
      box-shadow:3px 3px 0 rgba(167,139,250,0.4),5px 5px 0 rgba(244,114,182,0.2);
      border:2px solid rgba(244,114,182,0.3);
      opacity:0; transition:opacity 0.4s, transform 0.4s; position:relative;
    }
    .photo-frame.appeared { opacity:1; }
    .photo-frame::before {
      content:""; position:absolute; top:-7px; left:50%; transform:translateX(-50%);
      width:26px; height:11px;
      background:rgba(249,168,212,0.6); border:1px solid rgba(244,114,182,0.4);
    }
    .photo-inner {
      width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:4px; font-family:"Press Start 2P",monospace; font-size:0.25rem;
      color:rgba(90,45,110,0.5); text-align:center; line-height:1.8; overflow:hidden;
    }
    .photo-caption {
      font-family:"Klee One",cursive; font-size:0.58rem; color:var(--pink-d);
      text-align:center; margin-top:3px; line-height:1.2;
    }
    .deco { position:absolute; pointer-events:none; font-family:"Press Start 2P",monospace; font-size:0.4rem; z-index:2; }
    #close-montage {
      margin-top:12px; position:relative; z-index:1; padding:8px 20px;
      background:var(--pink-d); color:white; border:none; border-radius:3px;
      box-shadow:3px 3px 0 #831843;
      font-family:"Press Start 2P",monospace; font-size:0.36rem; letter-spacing:1px; cursor:pointer;
    }
  </style>
</head>

<script>
/* ============================================================
   PIXEL ART ENGINE
============================================================ */
function drawPixelArt(canvas,ps,pixels){
  let maxC=0,maxR=0;
  pixels.forEach(function(p){if(p[0]>maxC)maxC=p[0];if(p[1]>maxR)maxR=p[1];});
  canvas.width=(maxC+1)*ps; canvas.height=(maxR+1)*ps;
  var ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pixels.forEach(function(p){ctx.fillStyle=p[2];ctx.fillRect(p[0]*ps,p[1]*ps,ps,ps);});
}
function Rp(c,r,w,h,col){
  var o=[];
  for(var rr=r;rr<r+h;rr++) for(var cc=c;cc<c+w;cc++) o.push([cc,rr,col]);
  return o;
}

/* ============================================================
   CUTE RAINBOW CAKE — reference style:
   Round-cornered body, 4 pastel rainbow layers (purple/pink/yellow/mint),
   white fluffy cream top with coloured sprinkles,
   3 green-striped candles, dot eyes + smile, two little brown legs.

   Grid: 28 wide x 32 tall, pixel size 6
============================================================ */
var PS=6;
var BK="#2a2a2a";
var WH="#f5f0e8";   // cream frosting
var PU="#b8a0d8";   // purple layer
var PK="#f0a0b8";   // pink layer
var YW="#f5d890";   // yellow layer
var MT="#90c0b0";   // mint layer
var CG="#80c8a0";   // candle green
var CWW="#f0ece0";  // candle white
var YL="#f8d830";   // flame yellow
var OG="#f09020";   // flame orange
var BR="#c89060";   // brown legs
var DBR="#a07040";  // dark brown

var CANDLE_COLS=[8,14,20];
var NUM_CANDLES=3;
var candlesOut=[false,false,false];
var cakeAnimId=null;
var cakeCanvas=document.getElementById("cake-canvas");

function buildCakeStatic(){
  var px=[];

  /* -- CANDLE STICKS rows 5-10, 2px wide, green+white stripe -- */
  CANDLE_COLS.forEach(function(col){
    for(var r=5;r<=10;r++){
      var stripe=r%2===0?CG:CWW;
      px.push([col,r,stripe],[col+1,r,stripe]);
      px.push([col-1,r,BK],[col+2,r,BK]);
    }
    px.push([col-1,5,BK],[col,5,BK],[col+1,5,BK],[col+2,5,BK]);
    px.push([col-1,11,BK],[col,11,BK],[col+1,11,BK],[col+2,11,BK]);
  });

  /* -- WHITE CREAM TOP rows 10-14 -- */
  // top arc outline
  px.push([3,10,BK],[24,10,BK]);
  px.push([2,11,BK],[25,11,BK],[2,12,BK],[25,12,BK]);
  px.push([3,13,BK],[24,13,BK],[4,14,BK],[23,14,BK]);
  for(var cc=4;cc<24;cc++) px.push([cc,10,WH]);
  for(var cc=3;cc<25;cc++){ px.push([cc,11,WH]); px.push([cc,12,WH]); }
  for(var cc=4;cc<24;cc++) px.push([cc,13,WH]);
  for(var cc=5;cc<23;cc++) px.push([cc,14,WH]);
  // top outline row 10
  for(var cc=4;cc<24;cc++) px.push([cc,9,BK]);
  px.push([3,10,BK],[24,10,BK]);

  // Colourful sprinkles
  [[6,11,"#f47878"],[10,10,"#78b4f4"],[14,12,"#f4d478"],
   [18,11,"#98d898"],[21,10,"#d478d4"],[8,13,"#f47878"],
   [16,13,"#78b4f4"],[20,12,"#f4d478"]].forEach(function(s){px.push(s);});

  /* -- RAINBOW LAYERS rows 15-26 --
     Purple r15-17, Pink r18-20, Yellow r21-23, Mint r24-26 */
  var layers=[
    {col:PU,r:15,h:3},
    {col:PK,r:18,h:3},
    {col:YW,r:21,h:3},
    {col:MT,r:24,h:3}
  ];
  layers.forEach(function(layer,li){
    var lx=2, rx=26;
    for(var rr=layer.r;rr<layer.r+layer.h;rr++){
      for(var cc=lx;cc<rx;cc++) px.push([cc,rr,layer.col]);
      px.push([lx-1,rr,BK],[rx,rr,BK]);
    }
    // divider line between layers
    if(li<3){
      for(var cc=lx-1;cc<=rx;cc++) px.push([cc,layer.r+layer.h,BK]);
    }
  });
  // top outline of purple (where it meets the frosting)
  for(var cc=1;cc<27;cc++) px.push([cc,15,BK]);
  // rounded top corners of body
  px.push([1,15,BK],[1,16,BK]);
  px.push([26,15,BK],[26,16,BK]);
  // bottom of mint layer
  for(var cc=2;cc<26;cc++) px.push([cc,27,BK]);
  // rounded bottom corners
  px.push([2,26,BK],[3,26,BK],[24,26,BK],[25,26,BK]);

  /* -- FACE on yellow layer rows 21-25 -- */
  // Left eye
  px.push([8,21,BK],[9,21,BK],[8,22,BK],[9,22,BK]);
  // Right eye
  px.push([17,21,BK],[18,21,BK],[17,22,BK],[18,22,BK]);
  // Blush cheeks
  [[6,22,"#f4b0b0"],[7,22,"#f4b0b0"],[6,23,"#f4b0b0"]].forEach(function(s){px.push(s);});
  [[19,22,"#f4b0b0"],[20,22,"#f4b0b0"],[20,23,"#f4b0b0"]].forEach(function(s){px.push(s);});
  // Smile
  px.push([10,24,BK],[11,25,BK],[12,25,BK],[13,25,BK],[14,24,BK]);

  /* -- LEGS rows 27-31 -- */
  // Left leg
  [[6,28,BR],[7,28,BR],[8,28,BR],
   [5,29,BR],[6,29,BR],[7,29,BR],[8,29,BR],[9,29,BR],
   [5,30,BR],[6,30,BR],[7,30,BR],[8,30,BR],[9,30,BR],
   [6,31,BR],[7,31,BR],[8,31,BR],
   [5,28,BK],[9,28,BK],[4,29,BK],[10,29,BK],[4,30,BK],[10,30,BK],
   [5,31,BK],[9,31,BK],[6,32,BK],[7,32,BK],[8,32,BK],
   [8,29,DBR],[9,29,DBR],[8,30,DBR],[9,30,DBR]
  ].forEach(function(s){px.push(s);});
  // Right leg
  [[17,28,BR],[18,28,BR],[19,28,BR],
   [16,29,BR],[17,29,BR],[18,29,BR],[19,29,BR],[20,29,BR],
   [16,30,BR],[17,30,BR],[18,30,BR],[19,30,BR],[20,30,BR],
   [17,31,BR],[18,31,BR],[19,31,BR],
   [16,28,BK],[20,28,BK],[15,29,BK],[21,29,BK],[15,30,BK],[21,30,BK],
   [16,31,BK],[20,31,BK],[17,32,BK],[18,32,BK],[19,32,BK],
   [19,29,DBR],[20,29,DBR],[19,30,DBR],[20,30,DBR]
  ].forEach(function(s){px.push(s);});

  return px;
}

function renderCakeStatic(){
  cakeCanvas.width=29*PS; cakeCanvas.height=33*PS;
  var ctx=cakeCanvas.getContext("2d");
  ctx.clearRect(0,0,cakeCanvas.width,cakeCanvas.height);
  buildCakeStatic().forEach(function(p){
    ctx.fillStyle=p[2]; ctx.fillRect(p[0]*PS,p[1]*PS,PS,PS);
  });
}

function drawSmoke(ctx,col){
  var cx=(col+0.5)*PS, cy=4*PS;
  ctx.fillStyle="rgba(185,185,210,0.6)";
  ctx.beginPath(); ctx.ellipse(cx,cy,PS*0.5,PS*0.9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(185,185,210,0.35)";
  ctx.beginPath(); ctx.ellipse(cx+3,cy-PS,PS*0.4,PS*0.7,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(185,185,210,0.18)";
  ctx.beginPath(); ctx.ellipse(cx-2,cy-PS*1.8,PS*0.3,PS*0.5,0,0,Math.PI*2); ctx.fill();
}

function startCakeAnim(){
  renderCakeStatic();
  var ctx=cakeCanvas.getContext("2d");
  var frame=0;
  function loop(){
    frame++;
    var t=frame*0.14;
    CANDLE_COLS.forEach(function(col,i){
      var cx=col*PS;
      ctx.clearRect(cx-PS,0,4*PS,5*PS);
      // Redraw top of candle stick so no gap
      var topStripe=5%2===0?CG:CWW;
      ctx.fillStyle=topStripe; ctx.fillRect(cx,5*PS,2*PS,PS);
      ctx.fillStyle=BK;
      ctx.fillRect(cx-PS,5*PS,PS,PS);
      ctx.fillRect(cx+2*PS,5*PS,PS,PS);

      if(!candlesOut[i]){
        var sinV=Math.sin(t+i*2.1);
        var ox=sinV>0.3?1:(sinV<-0.3?-1:0);
        // Glow
        var gx=cx+PS+ox*2, gy=2.5*PS;
        var grd=ctx.createRadialGradient(gx,gy,1,gx,gy,PS*2.5);
        grd.addColorStop(0,"rgba(255,220,50,0.7)");
        grd.addColorStop(1,"rgba(255,140,0,0)");
        ctx.fillStyle=grd;
        ctx.beginPath(); ctx.arc(gx,gy,PS*2.2,0,Math.PI*2); ctx.fill();
        // Flame pixels
        ctx.fillStyle=YL;
        ctx.fillRect(cx+ox,0,PS,PS);
        ctx.fillRect(cx+ox,PS,PS,PS);
        ctx.fillRect(cx,PS,2*PS,PS);
        ctx.fillStyle=OG;
        ctx.fillRect(cx,2*PS,2*PS,PS);
        ctx.fillRect(cx,3*PS,2*PS,PS*0.5);
        ctx.fillStyle="rgba(255,255,220,0.9)";
        ctx.fillRect(cx+ox+1,PS*0.1,PS-2,PS*0.4);
      } else {
        drawSmoke(ctx,col);
      }
    });
    cakeAnimId=requestAnimationFrame(loop);
  }
  loop();
}

function stopCakeAnim(){
  if(cakeAnimId){cancelAnimationFrame(cakeAnimId);cakeAnimId=null;}
}

/* ============================================================
   BLOW ONE CANDLE
============================================================ */
function blowOneCandle(){
  var next=candlesOut.indexOf(false);
  if(next===-1) return;
  candlesOut[next]=true;
  var blown=candlesOut.filter(Boolean).length;
  var left=NUM_CANDLES-blown;
  var status=document.getElementById("candle-status");
  if(left>0){
    var msgs=["(>o<) keep blowing!","(*o*) almost there!","(^o^) one more!!"];
    status.textContent=msgs[blown-1]||blown+" / "+NUM_CANDLES+" out!";
  } else {
    onAllCandlesBlown();
  }
}

function onAllCandlesBlown(){
  stopMic();
  setTimeout(stopCakeAnim,1200);
  document.getElementById("blow-hint").style.display="none";
  document.getElementById("mic-bar-wrap").style.display="none";
  document.getElementById("candle-status").style.display="none";
  spawnConfetti(window.innerWidth/2,window.innerHeight*0.4);
  setTimeout(function(){
    document.getElementById("bday-reveal").style.display="block";
    document.getElementById("restart-btn").style.display="inline-block";
  },800);
  setTimeout(function(){
    document.getElementById("bday-msg").classList.remove("visible");
    buildMontage();
  },4200);
}

/* ============================================================
   MICROPHONE — blow detection, one candle per breath
============================================================ */
var BLOW_THRESHOLD=0.15, BLOW_DURATION=450;
var audioCtx=null,analyser=null,micStream=null,micActive=false;
var blowStartTime=null,micAnimId=null,onCooldown=false;

function startMicListening(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    micStream=stream;
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    var src=audioCtx.createMediaStreamSource(stream);
    analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
    src.connect(analyser); micActive=true;
    document.getElementById("mic-bar-wrap").style.display="block";
    document.getElementById("candle-status").textContent="0 / 3 candles blown out";
    checkBlowLoop();
  }).catch(function(err){
    console.warn("Mic unavailable:",err);
    document.getElementById("blow-hint").innerHTML="(no mic!) tap the cake<br/>to blow each candle!";
    document.getElementById("blow-hint").classList.remove("blink");
    document.getElementById("mic-bar-wrap").style.display="none";
    document.getElementById("candle-status").textContent="tap to blow each candle!";
    document.getElementById("bday-msg").onclick=function(){blowOneCandle();};
  });
}

function stopMic(){
  micActive=false;
  if(micAnimId){cancelAnimationFrame(micAnimId);micAnimId=null;}
  if(micStream){micStream.getTracks().forEach(function(t){t.stop();});micStream=null;}
  if(audioCtx){audioCtx.close();audioCtx=null;}
}

function checkBlowLoop(){
  if(!micActive) return;
  var data=new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);
  var sum=0;
  data.forEach(function(v){var n=(v-128)/128;sum+=n*n;});
  var rms=Math.sqrt(sum/data.length);
  var bar=document.getElementById("mic-bar");
  if(bar) bar.style.width=Math.min(rms*5*100,100)+"%";
  if(!onCooldown){
    if(rms>BLOW_THRESHOLD){
      if(!blowStartTime) blowStartTime=Date.now();
      else if(Date.now()-blowStartTime>BLOW_DURATION){
        blowStartTime=null; onCooldown=true;
        blowOneCandle();
        setTimeout(function(){onCooldown=false;},1300);
      }
    } else { blowStartTime=null; }
  }
  micAnimId=requestAnimationFrame(checkBlowLoop);
}

    flower:[[2,0,mid],[3,0,mid],[4,0,mid],[0,2,mid],[1,2,mid],[2,2,dark],[3,2,mid],[4,2,dark],[5,2,mid],[6,2,mid],[2,1,dark],[3,1,dark],[4,1,dark],[1,3,dark],[2,3,mid],[3,3,mid],[4,3,mid],[5,3,dark],[2,4,mid],[3,4,mid],[4,4,mid],[3,5,dark]],

var DECOS=[

/* ============================================================
   GAME FLOW — balloon
============================================================ */
var balloonActive=false,balloonCaught=false,flyAwayTimer=null;
var confettiAnim=null,confettiPieces=[];
var balloonWrap=document.getElementById("balloon-wrap");
var balloonImg=document.getElementById("balloon-img");
var hint=document.getElementById("hint");
var bdayMsg=document.getElementById("bday-msg");
var confettiCanvas=document.getElementById("confetti-canvas");
var cCtx=confettiCanvas.getContext("2d");
var balloonX=0,balloonY=0,targetX=0,targetY=0,driftId=null;

function releaseBalloon(){
  if(balloonActive) return; balloonActive=true;
  hint.classList.add("hidden");
  var bw=document.getElementById("bunny-wrapper");
  bw.classList.add("wiggle"); setTimeout(function(){bw.classList.remove("wiggle");},500);
  var br=bw.getBoundingClientRect();
  balloonX=br.left+br.width/2-55; balloonY=br.top+br.height*0.2;
  balloonWrap.style.left=balloonX+"px"; balloonWrap.style.top=balloonY+"px";
  balloonWrap.style.display="block"; balloonWrap.style.opacity="1";
  balloonWrap.classList.remove("flying");
  balloonImg.onclick=catchBalloon;
  balloonImg.ontouchstart=function(e){e.preventDefault();catchBalloon(e);};
  targetX=balloonX; targetY=balloonY;
  document.addEventListener("mousemove",onMouseMove);
  document.addEventListener("touchmove",onTouchMove,{passive:true});
  driftLoop();
  flyAwayTimer=setTimeout(function(){if(!balloonCaught)flyAway();},6000);
}

function onMouseMove(e){targetX=e.clientX-55;targetY=e.clientY-80;}
function onTouchMove(e){var t=e.touches[0];targetX=t.clientX-55;targetY=t.clientY-80;}
function driftLoop(){
  if(!balloonActive||balloonCaught) return;
  balloonX+=(targetX-balloonX)*0.04; balloonY+=(targetY-balloonY)*0.04; balloonY-=0.55;
  balloonWrap.style.left=balloonX+"px"; balloonWrap.style.top=balloonY+"px";
  driftId=requestAnimationFrame(driftLoop);
}
function flyAway(){
  cancelAnimationFrame(driftId);
  document.removeEventListener("mousemove",onMouseMove);
  document.removeEventListener("touchmove",onTouchMove);
  var fx=(Math.random()>0.5?1:-1)*(80+Math.random()*120);
  balloonWrap.style.setProperty("--fx",fx+"px");
  balloonWrap.classList.add("flying");
  setTimeout(function(){
    balloonWrap.style.display="none"; balloonWrap.classList.remove("flying");
    balloonActive=false; hint.textContent="(o_o;) it got away... try again!";
    hint.classList.remove("hidden");
  },1600);
}
function catchBalloon(){
  if(balloonCaught) return; balloonCaught=true;
  cancelAnimationFrame(driftId); clearTimeout(flyAwayTimer);
  document.removeEventListener("mousemove",onMouseMove);
  document.removeEventListener("touchmove",onTouchMove);
  balloonWrap.style.display="none";
  spawnConfetti(balloonX+55,balloonY+55);
  setTimeout(function(){
    candlesOut=[false,false,false];
    document.getElementById("bday-msg").onclick=null;
    bdayMsg.classList.add("visible");
    startCakeAnim();
    startMicListening();
  },500);
}

var CC=["#f472b6","#a78bfa","#34d399","#fbbf24","#60a5fa","#fb923c","#f9a8d4","#c4b5fd"];
function spawnConfetti(ox,oy){
  confettiCanvas.width=window.innerWidth; confettiCanvas.height=window.innerHeight;
  confettiCanvas.style.display="block"; confettiPieces=[];
  for(var i=0;i<160;i++){
    var ang=Math.random()*Math.PI*2,spd=3+Math.random()*10;
    confettiPieces.push({
      x:ox,y:oy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-6,
      rot:Math.random()*360,rotV:(Math.random()-0.5)*9,
      size:5+Math.random()*9,shape:Math.random()>0.5?"rect":"circle",
      color:CC[Math.floor(Math.random()*CC.length)],alpha:1,gravity:0.22+Math.random()*0.18
    });
  }
  confettiAnim=requestAnimationFrame(tickConfetti);
}
function tickConfetti(){
  cCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  var alive=false;
  confettiPieces.forEach(function(p){
    if(p.alpha<=0) return; alive=true;
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.99;p.rot+=p.rotV;p.alpha-=0.011;
    cCtx.save();cCtx.globalAlpha=Math.max(0,p.alpha);cCtx.fillStyle=p.color;
    cCtx.translate(p.x,p.y);cCtx.rotate(p.rot*Math.PI/180);
    if(p.shape==="rect") cCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    else{cCtx.beginPath();cCtx.arc(0,0,p.size/2,0,Math.PI*2);cCtx.fill();}
    cCtx.restore();
  });
  if(alive) confettiAnim=requestAnimationFrame(tickConfetti);
  else confettiCanvas.style.display="none";
}

function resetEverything(){
  stopMic(); stopCakeAnim();
  candlesOut=[false,false,false];
  blowStartTime=null; onCooldown=false;
  bdayMsg.classList.remove("visible");
  document.getElementById("bday-reveal").style.display="none";
  var bh=document.getElementById("blow-hint");
  bh.style.display=""; bh.classList.add("blink");
  bh.innerHTML="(o*w*o) blow out the candles !<br/>hold your mic close and blow";
  document.getElementById("mic-bar-wrap").style.display="";
  document.getElementById("mic-bar").style.width="0%";
  var cs=document.getElementById("candle-status");
  cs.style.display=""; cs.textContent="";
  document.getElementById("restart-btn").style.display="none";
  balloonActive=false; balloonCaught=false;
  balloonWrap.style.display="none"; balloonWrap.classList.remove("flying");
  hint.textContent="(u^w^u) tap the envelope!"; hint.classList.remove("hidden");
  cancelAnimationFrame(confettiAnim);
  cCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiCanvas.style.display="none";
  document.getElementById("montage").classList.remove("show");
  document.getElementById("bday-msg").onclick=null;
}
